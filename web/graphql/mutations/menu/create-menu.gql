mutation CreateMenu($restaurantId: String!, $name: String!) {
  createMenu(restaurantId: $restaurantId, name: $name) {
    name
    id
    isActive
    restaurantId
    categories {
      id
      name
    }
    items {
      id
      categoryId
      menuId
      dishId
      dish {
        id
        name
      }
    }
  }
}
