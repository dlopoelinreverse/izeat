mutation UpdateDish($updateDishInput: UpdateDishInput!) {
  updateDish(updateDishInput: $updateDishInput) {
    id
    name
    description
    price
    ingredients {
      ingredient {
        id
        name
        ingredientCategory {
          id
          name
        }
      }
    }
  }
}

mutation UpdateMenuItem($id: String!, $menuItemInput: MenuItemInput!) {
  updateMenuItem(id: $id, menuItemInput: $menuItemInput) {
    id
    menuId
    dishId
    categoryId
    priceOverride
    dish {
      id
      name
      description
      price
      ingredients {
        ingredient {
          id
          name
          ingredientCategory {
            id
            name
          }
        }
      }
    }
  }
}
