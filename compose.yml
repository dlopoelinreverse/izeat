version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas_backend
    restart: on-failure
    env_file: .env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend/src:/app/src
    networks:
      - saas-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: saas_web
    env_file: .env
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./web/app
          target: /app/app
          ignore:
            - node_modules/
            - .next/
        - action: sync
          path: ./web/components
          target: /app/components
        - action: sync
          path: ./web/components.json
          target: /app/components.json
        - action: sync
          path: ./web/contexts
          target: /app/contexts
        - action: sync
          path: ./web/hooks
          target: /app/hooks
        - action: sync
          path: ./web/proxy.ts
          target: /app/proxy.ts
        - action: sync
          path: ./web/types
          target: /app/types
        - action: sync
          path: ./web/graphql
          target: /app/graphql
        - action: sync
          path: ./web/lib
          target: /app/lib
        - action: rebuild
          path: ./web/package.json
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge
